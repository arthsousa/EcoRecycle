<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Reciclagem - Bem-vindo</title>
    <style>
        /* ===== CSS RESET E GERAL ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #2d5a3d, #1e3d2a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .container {
            width: 100%;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column; /* Organiza logo em cima e cartões embaixo */
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Logo */
        .logo {
            margin-bottom: 50px;
        }

        #logo-img {
            width: 120px;
            height: auto;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Container dos Cartões (Ajustado para 2 itens) */
        .selection-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap; 
            max-width: 800px;
            width: 100%;
        }

        /* Cartão de Opção */
        .option-card {
            background: rgba(139, 195, 139, 0.9);
            border-radius: 20px;
            padding: 45px 35px;
            width: 320px; /* Aumentado levemente para melhor preenchimento com 2 cards */
            max-width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
        }

        .option-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            background: rgba(120, 180, 120, 0.95);
        }

        .option-icon {
            background: #2d5a3d;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -85px auto 25px auto; /* Mantém o ícone flutuando na borda superior */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: background 0.3s ease;
        }

        .option-card:hover .option-icon {
            background: #1e3d2a;
        }

        .option-icon svg {
            width: 40px;
            height: 40px;
        }

        .option-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .option-description {
            font-size: 14px;
            color: #f5f5f5;
            line-height: 1.4;
        }

        /* ===== RESPONSIVIDADE ===== */
        @media (max-width: 768px) {
            .selection-container {
                flex-direction: column;
                align-items: center;
                gap: 65px; /* Espaçamento maior para o ícone flutuante do card de baixo não sobrepor */
            }
            .option-card {
                width: 100%;
                max-width: 340px;
            }
        }

        @media (max-width: 480px) {
            .logo {
                margin-bottom: 40px;
            }
            #logo-img {
                width: 100px;
            }
            .option-card {
                padding: 40px 25px;
            }
            .option-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <div class="logo">
            <img src="imagens/logo.png" alt="Terra Reciclagem" id="logo-img">
        </div>

        <div class="selection-container">

            <a href="login.html" class="option-card">
                <div class="option-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-12.5c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 8c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm6.8-5c-.11 0-.21.02-.3.05-.5.16-1.01.2-1.5.2-.42 0-.82-.04-1.2-.1-.58-.09-1.16-.1-1.8-.1s-1.22.01-1.8.1c-.38.06-.78.1-1.2.1-.49 0-1-.04-1.5-.2-.09-.03-.19-.05-.3-.05-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5c.3 0 .59-.09.83-.24.23.23.48.44.75.63.48.33 1.01.52 1.58.61.3.05.6.09.94.09s.64-.04.94-.09c.57-.09 1.1-.28 1.58-.61.27-.19.52-.4.75-.63.24.15.53.24.83.24.83 0 1.5-.67 1.5-1.5s-.67-1.5-1.5-1.5z" fill="white"/>
                    </svg>
                </div>
                <h1 class="option-title">Motorista</h1>
                <p class="option-description">Acessar o painel de coletas e rotas de transporte.</p>
            </a>

            <a href="login.html" class="option-card">
                <div class="option-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" fill="white"/>
                        <path d="M12 14C7.58172 14 4 17.5817 4 22H20C20 17.5817 16.4183 14 12 14Z" fill="white"/>
                    </svg>
                </div>
                <h1 class="option-title">Admin</h1>
                <p class="option-description">Gerenciar o sistema, gerir usuários e emitir relatórios.</p>
            </a>

        </div>
    </div>
</body>
</html>
