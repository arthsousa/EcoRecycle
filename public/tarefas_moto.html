<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoRecycle - Minhas Coletas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* Estilos base para consistência */
        :root {
            --color-primary: #2ecc71; 
            --color-secondary: #34495e; 
            --color-background: #f4f7f6; 
            --color-card: #ffffff; 
            --color-text: #333333; 
            --color-light-text: #7f8c8d; 
            --color-border: #e0e0e0; 
            --color-shadow: rgba(0, 0, 0, 0.08); 
            --color-highlight: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--color-background);
            color: var(--color-text);
            min-height: 100vh;
        }

        /* ===== CONTAINER PRINCIPAL ===== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ===== CABEÇALHO/NAVBAR ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--color-border);
        }

        .header h1 {
            font-size: 28px;
            color: var(--color-secondary);
        }

        .header .user-info {
            display: flex;
            align-items: center;
            font-weight: bold;
            color: var(--color-text);
        }
        
        .header .user-info i {
            margin-right: 5px;
            color: var(--color-primary);
        }

        /* ===== BOTÃO SAIR (LOGOUT) ===== */
        .logout-btn {
            background-color: #e74c3c; 
            color: white;
            border: none;
            padding: 8px 15px;
            margin-left: 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-weight: bold;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }


        /* ===== CONTROLS E FILTROS (ATUALIZADO) ===== */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
            padding: 15px;
            background-color: var(--color-card);
            border-radius: 8px;
            box-shadow: 0 4px 10px var(--color-shadow);
            flex-wrap: wrap; 
        }

        .controls input[type="text"], 
        .controls select,
        .controls input[type="date"] {
            padding: 10px;
            border: 1px solid var(--color-border);
            border-radius: 5px;
            flex-grow: 1;
            max-width: 300px;
            box-sizing: border-box; 
        }
        
        /* Estilos dos novos botões */
        .action-export-btn {
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .btn-pdf {
            background-color: #3498db; 
            color: white;
            border: none;
        }
        .btn-pdf:hover {
            background-color: #2980b9;
        }

        .btn-route {
            background-color: #f1c40f; 
            color: #333;
            border: none;
        }
        .btn-route:hover {
            background-color: #e6b200;
        }

        /* ===== LISTA DE TAREFAS (MANTIDO) ===== */
        .task-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        /* Estilos task-card (para não poluir) */
        .task-card {
            background-color: white; border-radius: 8px; padding: 15px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); transition: all 0.2s ease; border-left: 5px solid transparent; display: flex; flex-direction: column;
        }
        .task-card:hover { box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15); transform: translateY(-2px); }
        .priority-high { border-left-color: #e74c3c; }
        .priority-medium { border-left-color: #f1c40f; }
        .priority-low { border-left-color: #3498db; }
        .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px dashed var(--color-border); }
        .task-title { font-size: 18px; font-weight: bold; color: var(--color-secondary); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex-grow: 1; }
        .task-priority { font-size: 12px; font-weight: bold; padding: 4px 8px; border-radius: 15px; color: white; margin-left: 10px; }
        .priority-high .task-priority { background-color: #e74c3c; }
        .priority-medium .task-priority { background-color: #f39c12; }
        .priority-low .task-priority { background-color: #3498db; }
        .task-details div { font-size: 14px; margin: 5px 0; color: var(--color-light-text); }
        .task-details i { margin-right: 5px; color: var(--color-primary); }
        .task-description { font-size: 14px; margin-top: 15px; padding: 10px; background-color: var(--color-highlight); border-radius: 5px; }
        .task-actions { display: flex; justify-content: space-around; margin-top: 15px; padding-top: 10px; border-top: 1px dashed var(--color-border); }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 12px; padding: 5px 10px; border-radius: 5px; transition: all 0.2s; display: flex; align-items: center; }
        .action-btn i { margin-right: 5px; }
        .action-btn:hover { opacity: 0.8; background-color: var(--color-highlight); }
        .status-to-do { color: #f39c12; }
        .status-in-progress { color: #2980b9; }
        .status-done { color: #2ecc71; }
        .no-tasks { text-align: center; padding: 40px; font-size: 18px; color: var(--color-light-text); background-color: var(--color-card); border-radius: 8px; box-shadow: 0 4px 10px var(--color-shadow); }
        
        /* Novo estilo para impressão (PDF) */
        @media print {
            body { background: white; }
            .header, .controls { display: none; } 
            .task-list { 
                grid-template-columns: 1fr; 
                gap: 10px;
                padding: 10px;
            }
            .task-card {
                box-shadow: none;
                border: 1px solid #ccc;
            }
            .task-actions { display: none !important; } 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-truck"></i> Minhas Coletas</h1>
            <div class="user-info">
                <i class="fas fa-user-circle"></i> Logado como: <span id="userName">Motorista</span>
                <button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="searchBar" placeholder="Buscar por cliente, CEP ou descrição..." onkeyup="applyFilters()">
            
            <label for="statusFilter">Status:</label>
            <select id="statusFilter" onchange="applyFilters()">
                <option value="all">Todas</option>
                <option value="to-do">Pendente</option>
                <option value="in-progress">Em Andamento</option>
                <option value="done">Concluída</option>
            </select>
            
            <label for="priorityFilter">Prioridade:</label>
            <select id="priorityFilter" onchange="applyFilters()">
                <option value="all">Todas</option>
                <option value="high">Alta</option>
                <option value="medium">Média</option>
                <option value="low">Baixa</option>
            </select>
            
            <label for="dateStartFilter">De:</label>
            <input type="date" id="dateStartFilter" onchange="applyFilters()">
            
            <label for="dateEndFilter">Até:</label>
            <input type="date" id="dateEndFilter" onchange="applyFilters()">


            <button class="action-export-btn btn-pdf" onclick="generateDailyTasksPDF()">
                <i class="fas fa-file-pdf"></i> Gerar PDF do Dia
            </button>
            <button class="action-export-btn btn-route" onclick="calculateOptimalRoute()">
                <i class="fas fa-route"></i> Calcular Rota Otimizada
            </button>
        </div>

        <div class="task-list" id="taskList">
            </div>

        <div class="no-tasks" id="noTasksMessage" style="display:none;">
            Nenhuma coleta atribuída a você no momento.
        </div>
        
        <div id="printArea" style="display:none;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="tarefas.js"></script>
    <script src="tarefas_moto.js"></script>
</body>
</html>
