<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Reciclagem - Minha Conta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ===== CSS GERAL (MANTIDO) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #2d5a3d, #1e3d2a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background 0.5s ease; /* Adicionado transição */
        }

        .container {
            width: 100%;
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        #logo-img {
            width: 120px;
            height: auto;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px;
        }

        .login-card {
            background: rgba(139, 195, 139, 0.9);
            border-radius: 20px;
            padding: 40px 35px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.6s ease-out;
            transition: background 0.5s ease; /* Adicionado transição */
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-icon {
            background: #2d5a3d;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -60px auto 20px auto;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: background 0.5s ease; /* Adicionado transição */
        }

        .login-title {
            color: white;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            transition: color 0.5s ease; /* Adicionado transição */
        }
        
        /* Layout dos campos de informação */
        .account-info {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px; 
        }

        .form-group {
            text-align: left;
        }

        .form-label {
            display: block;
            color: white;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.5s ease; /* Adicionado transição */
        }

        /* --- INPUTS E EDIÇÃO POR ÍCONE --- */
        
        .input-with-icon {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px; 
            border: none;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: none;
        }

        /* INPUT SOMENTE LEITURA */
        .info-value, 
        .form-group input[readonly] { 
            width: 100%;
            padding: 12px 15px; 
            border: none;
            border-radius: 8px;
            font-size: 14px;
            
            background: #e9ecef !important; 
            color: #6c757d !important; 
            cursor: default !important;
            pointer-events: none !important;
            
            box-shadow: none;
            text-align: left;
            display: block;
            transition: all 0.3s ease;
        }
        
        /* INPUT EDITÁVEL */
        .form-group input:not([readonly]) { 
            background: white !important;
            color: #333 !important;
            cursor: text !important;
            pointer-events: auto !important;
            padding: 12px 40px 12px 15px !important;
        }

        .form-group input:not([readonly]):focus {
            outline: none;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .input-with-icon .fas {
            position: absolute;
            right: 15px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .edit-icon {
            color: #6c757d; 
        }

        .edit-icon:hover {
            color: #333;
        }

        .save-icon {
            color: #2d5a3d; 
        }

        .save-icon:hover:not(.disabled) {
            color: #1e3d2a;
        }

        .save-icon.disabled {
            color: #ccc;
            cursor: not-allowed;
        }
        
        .hidden {
            display: none !important;
        }

        /* --- BOTÕES DE NAVEGAÇÃO --- */
        
        /* NOVO: Botão de Configurações (Secundário) */
        .config-button {
            background: #4a7c59; /* Verde um pouco mais claro */
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            margin-top: 25px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .config-button:hover {
            background: #2d5a3d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .config-button .fas {
            margin-right: 10px;
        }

        /* Botão de Voltar (Primário e Maior) */
        .back-button {
            background: #2d5a3d; 
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            margin-top: 10px; /* Espaçamento menor após o novo botão Config */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .back-button:hover {
            background: #1e3d2a;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .back-button .fas {
            margin-right: 10px;
        }

        /* Botão de Sair (Secundário e Menor) */
        .logout-button-small {
            background: transparent; 
            color: #c0392b; 
            border: 1px solid #c0392b; 
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            margin-top: 10px; 
        }

        .logout-button-small:hover {
            background: #c0392b;
            color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        
        /* ===== DARK MODE CSS (NOVO) ===== */
        .dark-mode {
            background: linear-gradient(135deg, #121212, #000);
            color: white !important;
        }
        
        .dark-mode .login-card {
            background: rgba(30, 30, 30, 0.95);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        }
        
        .dark-mode .login-title, .dark-mode .form-label {
            color: #e0e0e0;
        }
        
        .dark-mode .user-icon {
            background: #444;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .dark-mode .info-value, 
        .dark-mode .form-group input[readonly] { 
            background: #444 !important;
            color: #bbb !important; 
        }

        .dark-mode .config-button {
             background: #555;
             color: #e0e0e0;
        }

        .dark-mode .config-button:hover {
             background: #444;
        }
        
        .dark-mode .back-button {
             background: #8bc34a; 
             color: black;
        }
        
        .dark-mode .back-button:hover {
            background: #7cb342;
        }
        
        .dark-mode .logout-button-small {
            background: transparent; 
            color: #ff7961; 
            border-color: #ff7961;
        }

        .dark-mode .logout-button-small:hover {
            background: #c0392b;
            color: white;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <a href="index.html">
                <img src="imagens/logo.png" alt="Terra Reciclagem" id="logo-img">
            </a>
        </div>

        <div class="login-card">
            <div class="user-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 12C14.7614 12 17 9.76142 17 7C17 4.23858 14.7614 2 12 2C9.23858 2 7 4.23858 7 7C7 9.76142 9.23858 12 12 12Z" fill="white"/>
                    <path d="M12 14C7.58172 14 4 17.5817 4 22H20C20 17.5817 16.4183 14 12 14Z" fill="white"/>
                </svg>
            </div>

            <h1 class="login-title">Minha Conta</h1>

            <div class="account-info">
                
                <div class="form-group">
                    <label for="userNameInput" class="form-label">NOME COMPLETO</label>
                    <div class="input-with-icon">
                        <input type="text" id="userNameInput" value="" placeholder="Carregando..." readonly>
                        <i id="editIcon" class="fas fa-pencil-alt edit-icon"></i> 
                        <i id="saveIcon" class="fas fa-check save-icon hidden"></i> 
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">FUNÇÃO NO SISTEMA</label>
                    <div id="userRole" class="info-value">Carregando...</div> 
                </div>

                <div class="form-group">
                    <label class="form-label">EMAIL</label>
                    <div id="userEmail" class="info-value">Carregando...</div> 
                </div>

                <div class="form-group">
                    <label class="form-label">SENHA</label>
                    <input type="password" id="userPassword" value="••••••••" readonly>
                </div>
            </div>

            <button onclick="window.location.href = 'configuracoes.html'" class="config-button">
                 <i class="fas fa-cog"></i> Configurações
            </button>
            
            <button onclick="window.location.href = 'dashboard.html'" class="back-button">
                 <i class="fas fa-arrow-left"></i> Voltar para o Sistema
            </button>
            
            <button id="logoutButton" class="logout-button-small">Sair do Sistema</button>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="conta.js"></script>
</body>
</html>
