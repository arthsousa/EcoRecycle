<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoRecycle - Agendador de Coletas (Recursos)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/main.min.css' rel='stylesheet' />
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
    
    <script src='https://cdn.jsdelivr.net/npm/@fullcalendar/resource-timeline@6.1.11/index.global.min.js'></script>
    
    <style>
        /* Estilos base copiados de calendario.html */
        :root {
            --color-primary: #2ecc71; /* Verde Esmeralda */
            --color-secondary: #34495e; /* Azul Marinho */
            --color-background: #f4f7f6; /* Fundo muito claro */
            --color-card: #ffffff; /* Fundo do cartão branco */
            --color-text: #333333; /* Texto escuro */
            --color-light-text: #7f8c8d; /* Texto cinza claro */
            --color-border: #e0e0e0; /* Borda clara */
            --color-shadow: rgba(0, 0, 0, 0.08); /* Sombra suave */
            --color-highlight: #ecf0f1; /* Destaque sutil */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Arial', sans-serif;
            background-color: var(--color-background);
            color: var(--color-text);
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ===== NAVBAR SUPERIOR ===== */
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-container {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .menu-toggle {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 5px;
            transition: transform 0.3s ease;
        }

        .hamburger-line {
            width: 25px;
            height: 3px;
            background-color: var(--color-secondary);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* --- NOVO CSS PARA O ÍCONE DA CONTA --- */
        .navbar-right a {
            color: #f5f5f5; /* Cor cinza claro/branco para o ícone */
            text-decoration: none; /* Remove o sublinhado padrão dos links */
            margin-right: 15px; /* Mantém o espaçamento igual ao dos outros ícones */
            cursor: pointer;
            transition: color 0.3s ease;
        }

        /* Garante que a cor permaneça cinza/branca nos estados :hover, :focus e :active */
        .navbar-right a:hover,
        .navbar-right a:focus,
        .navbar-right a:active {
            color: #ccc; /* Tom um pouco mais escuro no hover para dar feedback */
        }

        /* Garante que o ícone de usuário dentro do link adote a cor */
        .navbar-right a .fas {
            color: inherit; /* Herda a cor definida acima */
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #ecf0f1;
            font-size: 1.2em;
        }

        /* ===== SIDEBAR LATERAL RETRÁTIL ===== */
        .sidebar {
            position: fixed;
            top: 60px;
            left: -300px;
            width: 300px;
            height: calc(100vh - 60px);
            background-color: var(--color-card);
            transition: left 0.3s ease;
            z-index: 999;
            box-shadow: 4px 0 12px var(--color-shadow);
            border-right: 1px solid var(--color-border);
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 20px;
            background-color: var(--color-highlight);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--color-border);
        }

        .sidebar-header h3 {
            color: var(--color-secondary);
            font-size: 18px;
            font-weight: 600;
        }

        .close-sidebar {
            background: none;
            border: none;
            color: var(--color-secondary);
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
            border-radius: 3px;
            transition: background-color 0.3s ease;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
        }

        .menu-item {
            width: 100%;
            padding: 15px 20px;
            background: none;
            border: none;
            color: var(--color-text);
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 16px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .menu-item:hover {
            background-color: var(--color-highlight);
            color: var(--color-primary);
        }

        .menu-item.active {
            background-color: var(--color-primary);
            color: var(--color-card);
            box-shadow: inset 3px 0 0 var(--color-secondary);
        }
        
        .menu-item.active:hover {
            color: var(--color-card);
        }

        .menu-icon {
            font-size: 18px;
        }

        .sidebar-overlay {
            position: fixed;
            top: 60px;
            left: 0;
            width: 100%;
            height: calc(100vh - 60px);
            background-color: rgba(0,0,0,0.3);
            z-index: 998;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        /* ===== CONTEÚDO PRINCIPAL ===== */
        .main-content {
            margin-top: 60px;
            padding: 30px; 
            min-height: calc(100vh - 60px);
            transition: margin-left 0.3s ease;
            display: flex;
            flex-direction: column; 
            gap: 30px; 
        }
        
        /* Título da Página */
        .page-title {
            font-size: 2.5em;
            color: var(--color-secondary);
            margin-bottom: 0px; 
            font-weight: 700;
        }
        
        /* Container da Lista de Tarefas (Card principal) */
        .task-list-container {
            flex-grow: 1;
            background-color: var(--color-card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 20px var(--color-shadow);
            border: 1px solid var(--color-border);
        }
        
        .task-list-container h2 {
            font-size: 1.8em;
            color: var(--color-secondary);
            margin-bottom: 20px;
            border-bottom: 2px solid var(--color-highlight);
            padding-bottom: 10px;
        }

        /* Estilo para cada Card de Tarefa */
        .task-card {
            background-color: var(--color-highlight);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 5px solid var(--color-primary);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
        }
        
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px dashed var(--color-border);
        }
        
        .task-title {
            font-size: 1.4em;
            font-weight: 600;
            color: var(--color-secondary);
        }
        
        .task-priority {
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.9em;
            color: white;
        }
        
        .priority-high { background-color: #e74c3c; }
        .priority-medium { background-color: #f1c40f; }
        .priority-low { background-color: #2ecc71; }
        
        .task-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
            font-size: 0.95em;
        }
        
        .task-details div {
            display: flex;
            align-items: center;
            color: var(--color-text);
        }
        
        .task-details i {
            margin-right: 8px;
            color: var(--color-primary);
            font-size: 1.1em;
        }
        
        .task-description {
            padding-top: 10px;
            border-top: 1px dashed var(--color-border);
            color: var(--color-light-text);
            font-style: italic;
        }
        
        .task-description i {
            color: var(--color-secondary);
        }
        
        .no-tasks {
            text-align: center;
            padding: 50px;
            color: var(--color-light-text);
            font-size: 1.2em;
            background-color: var(--color-highlight);
            border-radius: 8px;
        }
        
        .no-tasks i {
            margin-right: 10px;
            color: var(--color-primary);
        }
        
        /* Botão de Voltar */
        .back-button {
            background-color: var(--color-secondary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        
        .back-button:hover {
            background-color: #2c3e50;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .main-content {
                padding: 15px;
            }
            .page-title {
                font-size: 2em;
            }
            .task-details {
                grid-template-columns: 1fr;
            }
        }

    </style>
</head>
<body>
    <nav class="top-navbar">
        <div class="navbar-left">
            <div class="logo-container">
                <img src="imagens/logo.png" alt="Logo" class="logo">
            </div>
            <button class="menu-toggle" id="menuToggle">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
        </div>
        <div class="navbar-center">
            </div>
        <div class="navbar-right">
            <a href="configuracoes.html" title="Configurações">
                <i class="fas fa-cog"></i>
            </a>
            <a href="conta.html" title="Minha Conta">
                <i class="fas fa-user-circle"></i>
            </a>
        </div>
    </nav>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>Menu EcoRecycle</h3>
            <button class="close-sidebar" id="closeSidebar">&times;</button>
        </div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html" class="menu-item"><i class="fas fa-chart-line menu-icon"></i> Dashboard</a></li>
            <li><a href="tarefas.html" class="menu-item"><i class="fas fa-tasks menu-icon"></i> Tarefas</a></li>
            <li><a href="calendario.html" class="menu-item active"><i class="fas fa-calendar-alt menu-icon"></i> Calendário</a></li>
            <li><a href="mapa.html" class="menu-item"><i class="fas fa-map-marked-alt menu-icon"></i> Mapa</a></li>
        </ul>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main-content">
        <a href="calendario.html" class="back-button">
            <i class="fas fa-arrow-left"></i> Voltar para o Calendário
        </a>
        <h1 class="page-title">Visualização de Tarefas da Semana</h1>
        
        <div class="task-list-container">
            <h2>Tarefas da Semana (Próximos 7 dias)</h2>
            <div id="weekly-tasks-list">
                <div class="no-tasks">
                    <i class="fas fa-spinner fa-spin"></i> Carregando tarefas...
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="script.js"></script>
    <script src="tarefas.js"></script> <script>
        // [!] MUDANÇA: O DOMContentLoaded agora é 'async' [!]
        document.addEventListener("DOMContentLoaded", async function() {
            // A função initializeSidebar está em script.js (conforme deduzido do erro)
            if (typeof initializeSidebar === 'function') {
                initializeSidebar(); 
            }
            
            // [!] MUDANÇA: Precisamos 'await' (esperar) o Supabase [!]
            if (typeof loadTasksFromStorage === 'function') {
                await loadTasksFromStorage(); // 'tasks' global será preenchida
            } else {
                console.error("Erro: A função loadTasksFromStorage (de tarefas.js) não foi encontrada.");
            }

            // Esta função só roda DEPOIS que 'loadTasksFromStorage' terminar
            renderWeeklyTasks();
        });

        function renderWeeklyTasks() {
            const listContainer = document.getElementById('weekly-tasks-list');
            
            // [!] MUDANÇA: Verificação mais segura, já que 'tasks' agora deve existir
            if (typeof tasks === 'undefined') {
                listContainer.innerHTML = '<div class="no-tasks"><i class="fas fa-exclamation-triangle"></i> Erro fatal: A variável global "tasks" (de tarefas.js) não foi carregada.</div>';
                console.error("A variável 'tasks' está indefinida. Verifique se 'tarefas.js' carregou corretamente.");
                return;
            }
            
            // O resto do seu código já estava bom!
            // Ele apenas dependia de 'tasks' estar preenchida.

            // 1. Definir o período da semana (próximos 7 dias)
            const today = new Date();
            today.setHours(0, 0, 0, 0); // Zera a hora para comparação
            const oneWeekLater = new Date(today);
            oneWeekLater.setDate(today.getDate() + 7);

            // 2. Filtrar as tarefas
            const weeklyTasks = tasks.filter(task => {
                // Prevenção de erro: garantir que collectionDate existe
                if (!task.collectionDate) return false; 
                
                // Ajuste: A data do banco pode vir com fuso, então tratamos como UTC
                const [year, month, day] = task.collectionDate.split('-');
                const taskDateOnly = new Date(Date.UTC(year, month - 1, day));
                
                // Considera apenas tarefas que não estão 'done' e estão dentro do período de 7 dias
                return task.status !== 'done' && taskDateOnly >= today && taskDateOnly < oneWeekLater;
            });
            
            // 3. Ordenar as tarefas (mais próximas primeiro)
            weeklyTasks.sort((a, b) => {
                const dateA = new Date(`${a.collectionDate}T${a.collectionTime || '00:00:00'}`);
                const dateB = new Date(`${b.collectionDate}T${b.collectionTime || '00:00:00'}`);
                return dateA - dateB;
            });

            // 4. Renderizar a lista
            if (weeklyTasks.length === 0) {
                listContainer.innerHTML = `
                    <div class="no-tasks">
                        <i class="fas fa-check-circle"></i> Parabéns! Nenhuma tarefa pendente para os próximos 7 dias.
                    </div>
                `;
                return;
            }

            listContainer.innerHTML = ''; // Limpa o conteúdo
            
            weeklyTasks.forEach(task => {
                // As funções globais vêm de 'tarefas.js'
                const wasteLabel = (window.wasteTypeLabels && window.wasteTypeLabels[task.wasteType]) || task.wasteType;
                const priorityClass = `priority-${task.priority}`;
                const priorityText = task.priority.charAt(0).toUpperCase() + task.priority.slice(1);
                const locationLabel = window.getLocationLabel ? getLocationLabel(task.location) : (task.location || 'N/D');
                const regionLabel = window.getRegionLabel ? getRegionLabel(task.location, task.region) : (task.region || 'N/D');
                
                // Formatação da data
                const taskDateTimeStr = `${task.collectionDate}T${task.collectionTime || '00:00:00'}`;
                // Criamos a data como se estivesse em UTC para evitar problemas de fuso
                const taskDate = new Date(taskDateTimeStr + 'Z'); 
                
                const formattedDate = taskDate.toLocaleDateString('pt-BR', { timeZone: 'UTC', weekday: 'long', day: 'numeric', month: 'long' });
                const formattedTime = taskDate.toLocaleTimeString('pt-BR', { timeZone: 'UTC', hour: '2-digit', minute: '2-digit' });

                const statusText = task.status.charAt(0).toUpperCase() + task.status.slice(1).replace('-', ' ');

                const taskCard = document.createElement('div');
                taskCard.className = `task-card ${priorityClass}`; // Adiciona a classe de prioridade para a borda
                taskCard.innerHTML = `
                    <div class="task-header">
                        <span class="task-title">${task.name}</span>
                        <span class="task-priority ${priorityClass}">${priorityText}</span>
                    </div>
                    <div class="task-details">
                        <div><i class="fas fa-calendar-alt"></i> Data: ${formattedDate}</div>
                        <div><i class="fas fa-clock"></i> Hora: ${formattedTime}</div>
                        <div><i class="fas fa-map-marker-alt"></i> Local: ${locationLabel} (${regionLabel})</div>
                        <div><i class="fas fa-user"></i> Responsável: ${task.responsible || 'N/D'}</div>
                        <div><i class="fas fa-truck"></i> Veículo: ${task.vehicle || 'N/D'}</div>
                        <div><i class="fas fa-trash-alt"></i> Tipo de Lixo: ${wasteLabel}</div>
                        <div><i class="fas fa-hashtag"></i> CEP: ${task.cep || 'N/D'}</div>
                        <div><i class="fas fa-info-circle"></i> Status: ${statusText}</div>
                    </div>
                    <div class="task-description">
                        <i class="fas fa-align-left"></i> Descrição: ${task.description || 'Sem descrição.'}
                    </div>
                `;
                listContainer.appendChild(taskCard);
            });
        }
        
        // As funções getRegionLabel e getLocationLabel estão em tarefas.js e são globais.
    </script>
</body>
</html>
